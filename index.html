<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Pulse — The Complete Advisor Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0C447C;
    --navy-deep: #082C50;
    --gold: #C99A3B;
    --gold-light: #E4C878;
    --cream: #FDF8F0;
    --cream-warm: #F5EDDC;
    --ink: #13202B;
    --ink-soft: #4A5A68;
    --line: #E4DCC8;
    --coral: #EB5757;
    --good: #2E9E6D;
    --page-w: 460px;
    --page-h: 720px;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html, body{
    width: 100%; height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 20%, #1a3a5c 0%, #081b2e 55%, #030a13 100%);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Ambient background texture ===== */
  .ambient-glow{
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 15% 15%, rgba(201,154,59,0.10), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(12,68,124,0.25), transparent 45%);
  }

  /* ===== Stage: holds the book ===== */
  .stage{
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    perspective: 2400px;
    z-index: 1;
  }

  .book{
    position: relative;
    width: var(--page-w);
    height: var(--page-h);
    transform-style: preserve-3d;
  }

  .book-shadow{
    position: absolute;
    left: 4%; right: 4%; bottom: -28px;
    height: 40px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), transparent 72%);
    filter: blur(6px);
    z-index: 0;
  }

  /* ===== Individual pages ===== */
  .page{
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 18px;
    overflow: hidden;
    background: var(--cream);
    box-shadow:
      0 30px 60px -12px rgba(3, 10, 19, 0.65),
      0 10px 20px -8px rgba(3, 10, 19, 0.5);
    transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform 0.85s cubic-bezier(0.645, 0.045, 0.355, 1);
    backface-visibility: hidden;
  }

  .page-face{
    position: absolute; inset: 0;
    backface-visibility: hidden;
    display: flex; flex-direction: column;
  }
  .page-face.back{
    transform: rotateY(180deg);
    background: var(--cream-warm);
  }

  /* Stacking: pages behind sit slightly offset + dimmed to feel like a stack */
  .page{ z-index: 10; }
  .page.flipped{ transform: rotateY(-180deg); }

  /* subtle page-edge stack illusion on the right */
  .book::after{
    content: '';
    position: absolute;
    top: 6px; bottom: 6px; right: -3px;
    width: 6px;
    background: repeating-linear-gradient(
      to bottom,
      #e9ddc2 0px, #e9ddc2 1px,
      #d8c9a3 1px, #d8c9a3 2px
    );
    border-radius: 0 6px 6px 0;
    box-shadow: 2px 0 6px rgba(0,0,0,0.25);
    z-index: 0;
  }

  /* ===== Navigation controls ===== */
  .nav-controls{
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 18px;
    z-index: 50;
  }
  .nav-btn{
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
  }
  .nav-btn:hover{ background: rgba(201,154,59,0.35); border-color: var(--gold); transform: scale(1.06); }
  .nav-btn:active{ transform: scale(0.94); }
  .nav-btn:disabled{ opacity: 0.25; cursor: default; pointer-events: none; }

  .page-indicator{
    color: rgba(255,255,255,0.75);
    font-size: 12.5px;
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
    min-width: 64px;
    text-align: center;
  }

  .dots{
    position: fixed;
    top: 26px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 7px;
    z-index: 50;
  }
  .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .dot.active{ background: var(--gold); width: 20px; border-radius: 4px; }

  .hint{
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    letter-spacing: 0.06em;
    z-index: 50;
    text-align: center;
    pointer-events: none;
    animation: hintFade 5s ease forwards;
  }
  @keyframes hintFade{
    0%, 60%{ opacity: 1; }
    100%{ opacity: 0; }
  }

  /* ===== Shared page content styles ===== */
  .page-pad{
    flex: 1;
    display: flex; flex-direction: column;
    padding: 32px 28px 46px;
    position: relative;
  }

  .phone-stage{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .eyebrow{
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .headline{
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 24px;
    line-height: 1.14;
    color: var(--navy);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .sub{
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .page-number{
    position: absolute;
    bottom: 18px; right: 26px;
    font-size: 9.5px;
    color: var(--ink-soft);
    opacity: 0.5;
    letter-spacing: 0.05em;
  }

  .brand-mark{
    position: absolute;
    bottom: 18px; left: 28px;
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--navy);
    opacity: 0.55;
    letter-spacing: 0.02em;
  }

  /* ===== Phone mockup illustration frame ===== */
  .phone-frame{
    position: relative;
    width: 264px;
    background: linear-gradient(160deg, #263c52, #0a1520);
    border-radius: 30px;
    padding: 9px;
    box-shadow:
      0 28px 48px -12px rgba(8, 30, 55, 0.5),
      0 6px 16px rgba(8, 30, 55, 0.35),
      inset 0 0 0 1px rgba(255,255,255,0.1);
  }
  .phone-screen{
    width: 100%;
    background: var(--cream);
    border-radius: 22px;
    overflow: hidden;
    position: relative;
  }
  .phone-screen-inner{
    zoom: 1.32;
  }
  .phone-notch{
    position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    width: 62px; height: 5px;
    background: #0a1520;
    border-radius: 4px;
    z-index: 5;
  }

  /* feature list rows used across pages */
  .feature-list{ display: flex; flex-direction: column; gap: 9px; margin-top: auto; padding-bottom: 8px; }
  .feature-row{
    display: flex; align-items: flex-start; gap: 9px;
    font-size: 11.5px; line-height: 1.45; color: var(--ink);
  }
  .feature-check{
    flex-shrink: 0;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    font-size: 8.5px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  /* ===== COVER PAGE ===== */
  .pf-cover{
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 40px 34px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,154,59,0.16), transparent 55%),
      linear-gradient(175deg, var(--navy-deep) 0%, var(--navy) 55%, #0a3862 100%);
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .pf-cover::before{
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
  }
  .cover-emblem{ margin-bottom: 22px; filter: drop-shadow(0 2px 8px rgba(201,154,59,0.4)); }
  .cover-logo-wrap{
    background: #fff;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 26px;
    box-shadow: 0 20px 40px -8px rgba(0,0,0,0.35);
  }
  .cover-logo{
    width: 168px;
    height: 168px;
    display: block;
    border-radius: 8px;
  }
  .cover-eyebrow{
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold-light); margin-bottom: 18px;
  }
  .cover-title{
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 58px;
    line-height: 0.98;
    letter-spacing: -0.01em;
    margin-bottom: 22px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .cover-rule{
    width: 52px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 22px;
  }
  .cover-tag{
    font-size: 13.5px; line-height: 1.65;
    color: rgba(255,255,255,0.78);
    max-width: 310px;
    margin-bottom: 32px;
  }
  .cover-badges{
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .cover-badges span{
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
    color: var(--gold-light);
    border: 1px solid rgba(201,154,59,0.4);
    padding: 6px 13px; border-radius: 100px;
    background: rgba(201,154,59,0.08);
  }

  /* ===== BACK PAGE ===== */
  .pf-back{
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 40px 36px;
    background: linear-gradient(175deg, var(--navy-deep) 0%, var(--navy) 60%, #0a3862 100%);
    color: #fff;
  }
  .back-title{
    font-family: 'Playfair Display', serif;
    font-weight: 700; font-size: 26px; line-height: 1.25;
    margin: 20px 0 16px;
  }
  .back-sub{
    font-size: 12.5px; line-height: 1.65;
    color: rgba(255,255,255,0.7);
    max-width: 280px;
    margin-bottom: 28px;
  }
  .back-rule{
    width: 40px; height: 1px;
    background: rgba(201,154,59,0.5);
    margin-bottom: 18px;
  }
  .back-footer{
    font-size: 10px; letter-spacing: 0.06em; color: rgba(255,255,255,0.4);
  }

  /* ===== RATINGS PAGE ===== */
  .ratings-summary{
    text-align: center;
    margin-bottom: 18px;
  }
  .ratings-score{
    font-family: 'Playfair Display', serif;
    font-weight: 800; font-size: 44px; color: var(--navy); line-height: 1;
  }
  .ratings-stars{
    font-size: 17px; color: var(--gold); letter-spacing: 3px; margin: 8px 0 4px;
  }
  .ratings-count{
    font-size: 10.5px; color: var(--ink-soft); letter-spacing: 0.03em;
  }
  .review-card{
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(12,68,124,0.05);
  }
  .review-stars{ font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 6px; }
  .review-text{
    font-size: 11.5px; line-height: 1.55; color: var(--ink);
    font-style: italic; margin-bottom: 8px;
  }
  .review-name{ font-size: 10px; color: var(--ink-soft); font-weight: 600; }

  .fb-section-label{
    font-size: 11px; font-weight: 700; color: var(--navy); text-transform: uppercase;
    letter-spacing: 0.05em; margin: 18px 0 8px;
  }
  .fb-empty-note{ font-size: 11px; color: var(--ink-soft); font-style: italic; margin-bottom: 10px; }
  .fb-form{
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; margin-top: 10px;
  }
  .fb-form input, .fb-form textarea{
    width: 100%; box-sizing: border-box; font-family: inherit; font-size: 12px;
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px;
    background: var(--cream, #FDF8F0); color: var(--ink);
  }
  .fb-form textarea{ resize: vertical; min-height: 54px; }
  .fb-star-picker{ display: flex; gap: 4px; margin-bottom: 10px; }
  .fb-star-picker span{
    font-size: 22px; color: var(--line); cursor: pointer; line-height: 1; user-select: none;
  }
  .fb-star-picker span.filled{ color: var(--gold); }
  .fb-submit-btn{
    width: 100%; border: none; border-radius: 8px; padding: 10px; font-size: 12px;
    font-weight: 700; letter-spacing: 0.03em; background: var(--navy); color: #fff; cursor: pointer;
  }
  .fb-submit-btn:disabled{ opacity: 0.55; cursor: default; }
  .fb-status{ font-size: 11px; margin-top: 8px; text-align: center; }
  .fb-status.success{ color: #1a7a3c; }
  .fb-status.error{ color: #B91C1C; }

  /* ===== PHONE MOCKUP: shared component styles ===== */
  .mock-topbar{
    background: var(--navy);
    color: #fff;
    font-size: 10.5px; font-weight: 700;
    padding: 10px 12px;
    letter-spacing: 0.01em;
  }
  .mock-topbar-cake{ background: var(--gold); color: var(--navy); margin-top: 4px; }

  /* Broadcast page mock */
  .mock-broadcast{ display: flex; flex-direction: column; }
  .mock-compose{ padding: 10px 11px; flex: 1; }
  .mock-field-label{ font-size: 8px; color: var(--ink-soft); font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
  .mock-field{
    background: #fff; border: 1px solid var(--line); border-radius: 6px;
    font-size: 9px; padding: 6px 8px; margin-bottom: 8px; color: var(--ink);
  }
  .mock-editor{ background: #fff; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .mock-editor-toolbar{
    display: flex; gap: 8px; padding: 5px 8px;
    background: var(--cream-warm); border-bottom: 1px solid var(--line);
    font-size: 8.5px; color: var(--navy); font-weight: 700;
  }
  .mock-editor-body{
    padding: 8px; font-size: 9px; line-height: 1.55; color: var(--ink);
  }
  .mock-highlight{ background: rgba(201,154,59,0.25); padding: 0 2px; border-radius: 2px; }
  .mock-send-row{ display: flex; gap: 6px; padding: 8px 11px; }
  .mock-btn-gold, .mock-btn-navy{
    flex: 1; text-align: center; font-size: 8.5px; font-weight: 700; color: #fff;
    padding: 7px 0; border-radius: 7px;
  }
  .mock-btn-gold{ background: var(--gold); }
  .mock-btn-navy{ background: var(--navy); }

  /* Targeting page mock */
  .mock-targeting{ display: flex; flex-direction: column; }
  .mock-sort-row{ display: flex; gap: 5px; padding: 8px 10px 4px; flex-wrap: wrap; }
  .chip{
    font-size: 8px; font-weight: 700; color: var(--navy);
    border: 1px solid var(--line); border-radius: 100px;
    padding: 4px 9px; background: #fff;
  }
  .chip-active{ background: var(--navy); color: #fff; border-color: var(--navy); }
  .mock-filter-select{
    margin: 4px 10px 8px; background: var(--cream-warm); border: 1px solid var(--line);
    border-radius: 6px; font-size: 8.5px; padding: 6px 8px; color: var(--ink);
  }
  .mock-recipient-row{
    display: flex; align-items: center; gap: 7px;
    padding: 7px 10px; margin: 0 8px 5px; border-radius: 7px;
    background: var(--cream-warm);
  }
  .mock-check{
    width: 13px; height: 13px; border-radius: 3px; background: var(--gold);
    color: #fff; font-size: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .mock-recipient-info{ flex: 1; min-width: 0; }
  .mock-name{ font-size: 9px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mock-meta{ font-size: 7.5px; color: var(--ink-soft); display: flex; align-items: center; gap: 3px; margin-top: 1px; }
  .mock-badge{
    background: var(--coral); color: #fff; font-size: 6px; font-weight: 800;
    padding: 1px 4px; border-radius: 100px; letter-spacing: 0.02em;
  }
  .mock-badge-good{ background: var(--good); }
  .mock-amount{ font-size: 9px; font-weight: 700; color: var(--navy); flex-shrink: 0; }

  /* Scheduling page mock */
  .mock-schedule{ display: flex; flex-direction: column; padding-bottom: 8px; }
  .mock-toggle-row{ display: flex; gap: 6px; padding: 10px 10px 8px; }
  .mock-toggle-off, .mock-toggle-on{
    flex: 1; text-align: center; font-size: 8px; font-weight: 700;
    padding: 7px 0; border-radius: 7px; border: 1px solid var(--line);
  }
  .mock-toggle-off{ color: var(--navy); background: #fff; }
  .mock-toggle-on{ color: #fff; background: var(--navy); border-color: var(--navy); }
  .mock-schedule-box{
    margin: 0 10px 10px; background: var(--cream-warm); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px;
  }
  .mock-day-row{ display: flex; gap: 4px; font-size: 7.5px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .mock-day-row span{ flex: 1; text-align: center; padding: 4px 0; border-radius: 5px; background: #fff; border: 1px solid var(--line); }
  .mock-day-row .day-active{ background: var(--navy); color: #fff; border-color: var(--navy); }
  .mock-time{
    background: #fff; border: 1px solid var(--line); border-radius: 5px;
    font-size: 8.5px; padding: 5px 8px; margin-bottom: 6px; color: var(--ink); font-weight: 600;
  }
  .mock-schedule-note{ font-size: 7.5px; color: var(--navy); font-weight: 600; line-height: 1.4; }
  .mock-resume-card{
    margin: 6px 10px 0; background: var(--gold); border-radius: 8px;
    padding: 9px 10px; text-align: center;
  }
  .mock-resume-title{ font-size: 8.5px; font-weight: 800; color: #fff; letter-spacing: 0.02em; }
  .mock-resume-sub{ font-size: 7.5px; color: rgba(255,255,255,0.9); margin-top: 2px; }

  /* Summary page mock */
  .mock-summary{ padding: 10px 11px; }
  .mock-chart-label{ font-size: 8.5px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .mock-bars{ display: flex; align-items: flex-end; gap: 6px; height: 70px; margin-bottom: 6px; }
  .mock-bar{
    flex: 1; background: var(--navy); border-radius: 4px 4px 0 0;
    position: relative; min-height: 8px;
  }
  .mock-bar-gold{ background: var(--gold); }
  .mock-bar span{
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    font-size: 7.5px; font-weight: 700; color: var(--navy);
  }
  .mock-plan-row{
    display: flex; justify-content: space-between; align-items: center;
    background: var(--cream-warm); border-radius: 6px;
    padding: 6px 9px; margin-bottom: 5px;
    font-size: 8.5px; color: var(--ink);
  }
  .mock-plan-row b{ color: var(--navy); }

  /* Lapsed page mock */
  .mock-lapsed{ padding-bottom: 8px; }
  .mock-lapsed-count{ font-size: 8px; color: var(--ink-soft); padding: 8px 10px 4px; }
  .mock-lapsed-row{
    display: flex; align-items: center; gap: 8px;
    margin: 0 8px 6px; border-radius: 7px; overflow: hidden;
    background: #FDF1F0;
  }
  .mock-lapsed-bar{ width: 4px; align-self: stretch; background: var(--coral); }
  .mock-lapsed-info{ flex: 1; min-width: 0; padding: 7px 0; }
  .mock-lapsed-row .mock-amount{ padding-right: 9px; }

  /* Reminders page mock */
  .mock-reminders{ padding-bottom: 8px; }
  .mock-reminder-row{
    display: flex; align-items: center; gap: 7px;
    padding: 7px 10px; margin: 6px 8px 0;
    border-radius: 7px; background: var(--cream-warm);
  }
  .mock-check-box{
    width: 13px; height: 13px; border-radius: 4px; border: 1.5px solid var(--line);
    background: #fff; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: #fff;
  }
  .mock-check-box.checked{ background: var(--navy); border-color: var(--navy); }
  .mock-divider{ height: 1px; background: var(--line); margin: 10px 10px 0; }
</style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="dots" id="dots"></div>

<div class="stage">
  <div class="book" id="book">
    <div class="book-shadow"></div>
    <!-- Pages injected by JS -->
  </div>
</div>

<!-- ============================================================
     PAGE TEMPLATES — each <template> becomes one page-face.
     Order here = reading order (front faces only; back faces are
     auto-generated as continuation surfaces so the flip has a back).
     ============================================================ -->

<template id="tpl-cover">

<div class="hint" id="hint">Tap the arrows or swipe to turn pages</div>


<div class="nav-controls">
  <button class="nav-btn" id="prevBtn" aria-label="Previous page">&#8249;</button>
  <span class="page-indicator" id="pageIndicator">1 / 9</span>
  <button class="nav-btn" id="nextBtn" aria-label="Next page">&#8250;</button>
</div>

<script>
(function(){
  // Order of content pages (front faces). The book pairs these into
  // physical "leaves" — each leaf has a front and back face, and
  // flipping reveals the next leaf's front while hiding the previous
  // leaf's back, exactly like a real page turn.
  const PAGE_IDS = [
    'tpl-cover',
    'tpl-due-reminder',
    'tpl-birthday',
    'tpl-client-management',
    'tpl-fund-value',
    'tpl-product-analytics',
    'tpl-broadcast',
    'tpl-ratings',
    'tpl-back'
  ];

  const book = document.getElementById('book');
  const dotsContainer = document.getElementById('dots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pageIndicator = document.getElementById('pageIndicator');
  const hint = document.getElementById('hint');

  let currentLeaf = 0; // which leaf is "on top" (0 = cover showing)
  const totalLeaves = PAGE_IDS.length;
  const leafEls = [];

  // Build one <div class="page"> per content page. Each page's front
  // face shows that page's content; its back face shows a faint
  // continuation texture (the "next page bleeding through" look) so
  // the flip always has something believable on the reverse side,
  // without content appearing twice.
  PAGE_IDS.forEach((tplId, i) => {
    const tpl = document.getElementById(tplId);
    const pageEl = document.createElement('div');
    pageEl.className = 'page';
    pageEl.style.zIndex = totalLeaves - i;

    const front = document.createElement('div');
    front.className = 'page-face front';
    // Cover/back/ratings templates already contain their own full-bleed
    // wrapper; content pages need the shared .page-pad wrapper with a
    // page number so they read as a numbered booklet.
    if (tplId === 'tpl-cover' || tplId === 'tpl-back'){
      front.appendChild(tpl.content.cloneNode(true));
    } else {
      const pad = document.createElement('div');
      pad.className = 'page-pad';
      pad.appendChild(tpl.content.cloneNode(true));
      const num = document.createElement('div');
      num.className = 'page-number';
      num.textContent = String(i).padStart(2,'0') + ' / ' + String(totalLeaves - 2).padStart(2,'0');
      const brand = document.createElement('div');
      brand.className = 'brand-mark';
      brand.textContent = 'Client Pulse';
      pad.appendChild(num);
      pad.appendChild(brand);
      front.appendChild(pad);
    }

    const back = document.createElement('div');
    back.className = 'page-face back';
    // Blank warm-cream back face — represents the reverse side of this
    // physical page, deliberately unadorned so the flip motion (not
    // extra content) carries the moment.
    back.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;opacity:0.15;"><svg width="34" height="34" viewBox="0 0 46 46" fill="none"><circle cx="23" cy="23" r="21" stroke="#0C447C" stroke-width="1.2"/></svg></div>';

    pageEl.appendChild(front);
    pageEl.appendChild(back);
    book.appendChild(pageEl);
    leafEls.push(pageEl);
  });

  // Dots: one per leaf, click to jump directly to that page.
  PAGE_IDS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.addEventListener('click', () => goToLeaf(i));
    dotsContainer.appendChild(dot);
  });

  function render(){
    leafEls.forEach((el, i) => {
      el.classList.toggle('flipped', i < currentLeaf);
      // Keep z-index sensible so flipped (now on the left, face-down)
      // pages stack correctly beneath the still-to-be-flipped ones.
      el.style.zIndex = i < currentLeaf ? i + 1 : totalLeaves - i;
    });
    Array.from(dotsContainer.children).forEach((dot, i) => {
      dot.classList.toggle('active', i === currentLeaf);
    });
    prevBtn.disabled = currentLeaf === 0;
    nextBtn.disabled = currentLeaf === totalLeaves - 1;
    pageIndicator.textContent = (currentLeaf + 1) + ' / ' + totalLeaves;
  }

  function goToLeaf(target){
    currentLeaf = Math.max(0, Math.min(totalLeaves - 1, target));
    render();
  }

  function nextPage(){ if (currentLeaf < totalLeaves - 1){ currentLeaf++; render(); } }
  function prevPage(){ if (currentLeaf > 0){ currentLeaf--; render(); } }

  nextBtn.addEventListener('click', nextPage);
  prevBtn.addEventListener('click', prevPage);

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' '){ e.preventDefault(); nextPage(); }
    if (e.key === 'ArrowLeft'){ e.preventDefault(); prevPage(); }
  });

  // Swipe navigation (touch)
  let touchStartX = null;
  document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50){
      if (dx < 0) nextPage(); else prevPage();
    }
    touchStartX = null;
  }, { passive: true });

  // Click on the book itself also advances — right half = next, left half = prev,
  // but only when clicking the page background, not interactive chips/badges.
  book.addEventListener('click', (e) => {
    const rect = book.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    if (clickX > rect.width / 2){ nextPage(); } else { prevPage(); }
  });

  setTimeout(() => { hint.style.display = 'none'; }, 5200);

  render();
})();

/* ============================================================
   LIVE FEEDBACK — loads approved reviews from the standalone
   feedback backend (see Client_Pulse_Feedback_Code.gs) and lets
   any visitor submit their own. New submissions land unapproved
   and only appear here after being ticked "Approved" in the
   Feedback sheet — see that file's header comment for setup.
   ============================================================ */
(function(){
  // Paste your deployed Web App URL here after setting up
  // Client_Pulse_Feedback_Code.gs (see its header comment).
  const FEEDBACK_API_URL = 'PASTE_YOUR_FEEDBACK_WEB_APP_URL_HERE';

  function escapeHtml(str){
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function starsHtml(n){
    n = Math.max(0, Math.min(5, Math.round(Number(n) || 0)));
    return '&#9733;'.repeat(n) + '&#9734;'.repeat(5 - n);
  }

  async function loadLiveFeedback(){
    const container = document.getElementById('liveFeedbackList');
    if (!container || FEEDBACK_API_URL.indexOf('PASTE_YOUR') === 0) return;
    try{
      const res = await fetch(FEEDBACK_API_URL + '?action=getApprovedFeedback');
      const data = await res.json();
      const list = (data && data.feedback) || [];
      if (list.length === 0){
        container.innerHTML = '<div class="fb-empty-note">Be the first to leave feedback below.</div>';
        return;
      }
      container.innerHTML = list.map(item => (
        '<div class="review-card">'
        + '<div class="review-stars">' + starsHtml(item.stars) + '</div>'
        + '<p class="review-text">"' + escapeHtml(item.comment) + '"</p>'
        + '<div class="review-name">— ' + escapeHtml(item.name) + '</div>'
        + '</div>'
      )).join('');
    }catch(e){
      container.innerHTML = '<div class="fb-empty-note">Couldn\u2019t load feedback right now.</div>';
    }
  }

  function setupStarPicker(){
    const picker = document.getElementById('fbStarPicker');
    if (!picker) return 0;
    let selected = 0;
    const stars = Array.from(picker.children);
    function paint(n){
      stars.forEach((s, i) => s.classList.toggle('filled', i < n));
    }
    stars.forEach(s => {
      s.addEventListener('click', () => {
        selected = Number(s.dataset.value);
        paint(selected);
      });
      s.addEventListener('mouseenter', () => paint(Number(s.dataset.value)));
      s.addEventListener('mouseleave', () => paint(selected));
    });
    return { get: () => selected };
  }

  function setupSubmit(starPicker){
    const btn = document.getElementById('fbSubmitBtn');
    const status = document.getElementById('fbStatus');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      const name = document.getElementById('fbName').value.trim();
      const comment = document.getElementById('fbComment').value.trim();
      const stars = starPicker.get();
      status.className = 'fb-status';
      status.textContent = '';

      if (!name || !comment || !stars){
        status.className = 'fb-status error';
        status.textContent = 'Please add your name, a star rating, and a short comment.';
        return;
      }
      if (FEEDBACK_API_URL.indexOf('PASTE_YOUR') === 0){
        status.className = 'fb-status error';
        status.textContent = 'Feedback isn\u2019t connected yet \u2014 set FEEDBACK_API_URL first.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'SENDING\u2026';
      try{
        const res = await fetch(FEEDBACK_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'submitFeedback', name, stars, comment })
        });
        const data = await res.json();
        if (data && data.success){
          status.className = 'fb-status success';
          status.textContent = 'Thanks! Your feedback will appear here once approved.';
          document.getElementById('fbName').value = '';
          document.getElementById('fbComment').value = '';
          Array.from(document.getElementById('fbStarPicker').children).forEach(s => s.classList.remove('filled'));
        } else {
          status.className = 'fb-status error';
          status.textContent = (data && data.error) || 'Something went wrong \u2014 please try again.';
        }
      }catch(e){
        status.className = 'fb-status error';
        status.textContent = 'Could not reach the server \u2014 please try again.';
      }finally{
        btn.disabled = false;
        btn.textContent = 'SUBMIT FEEDBACK';
      }
    });
  }

  const picker = setupStarPicker();
  setupSubmit(picker);
  loadLiveFeedback();
})();
</script>
